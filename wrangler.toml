# Cloudflare Pages project configuration (used by `wrangler pages deploy`).
#
# The site is deployed from CI: Trunk builds the wasm bundle into ./dist, and
# the Pages Function in ./functions/ gates every request behind a passphrase.
#
# The passphrase itself is NOT stored here — set SITE_PASSPHRASE (and ideally a
# random COOKIE_SECRET) as environment variables on the Pages project via the
# Cloudflare dashboard or `wrangler pages secret put`.
name = "bevy-2d-rpg-game"
compatibility_date = "2026-06-17"
pages_build_output_dir = "dist"
