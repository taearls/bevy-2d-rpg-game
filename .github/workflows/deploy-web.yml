name: Deploy Web Build

# Builds the WebAssembly version and publishes it to GitHub Pages so the latest
# `main` is always playable at:
#   https://taearls.github.io/bevy-2d-rpg-game/
#
# One-time setup: in the repo's Settings → Pages, set "Source" to
# "GitHub Actions". After that every push to `main` redeploys automatically.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Project pages are served from a sub-path, so asset URLs must be prefixed
  # with the repository name.
  PUBLIC_URL: /bevy-2d-rpg-game/

# Allow the workflow to publish to Pages via the official deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; cancel superseded in-progress builds.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build wasm bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Build release wasm bundle
        run: trunk build --release --public-url "$PUBLIC_URL"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
